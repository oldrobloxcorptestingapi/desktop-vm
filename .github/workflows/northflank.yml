name: Deploy to Northflank

on:
  push:
    branches:
      - main          # auto-deploy on every push to main
  workflow_dispatch:  # adds a manual "Run workflow" button in the GitHub UI

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Northflank
        uses: northflank/github-action@v1
        with:
          northflank-api-key: ${{ secrets.NORTHFLANK_API_KEY }}
          project-id: ${{ secrets.NORTHFLANK_PROJECT_ID }}
          service-id: linux-desktop
